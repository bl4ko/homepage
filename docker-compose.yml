services:
  nginx:
    image: lscr.io/linuxserver/swag:latest@sha256:ae2516c55ffc80e9ccc5d2ab361a3284b93721ac7ad5c1168f240c01f2503595
    container_name: nginx
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - URL=about.bl4ko.com
      - VALIDATION=http
      # - SUBDOMAINS=www, #optional
      - STAGING=false #optional
    volumes:
      - ./docker/swag:/config
    ports:
      - 443:443
      - 80:80 #Required for certbot validation
    restart: unless-stopped
    depends_on:
      - next

  next:
    image: bl4ko/homepage:latest@sha256:4967780f30a9b96a9a7a601edcc4d261dbb2abfe5658e0a3eadc3d66ec3886b4
    container_name: next
    expose:
      - 3000
