services:
  nginx:
    image: lscr.io/linuxserver/swag:latest@sha256:47f516d0b5b82f53aea7f5266c2c071e3817e6e84c537ed9e03d2d1781f959de
    container_name: nginx
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - URL=about.bl4ko.com
      - VALIDATION=http
      # - SUBDOMAINS=www, #optional
      - STAGING=false #optional
    volumes:
      - ./docker/swag:/config
    ports:
      - 443:443
      - 80:80 #Required for certbot validation
    restart: unless-stopped
    depends_on:
      - next

  next:
    image: bl4ko/homepage:latest@sha256:be5168a62137ee9cdfde2a1d2b4126cd08121e8e0df0ce2c2b06eca2deb2aa57
    container_name: next
    expose:
      - 3000
