services:
  nginx:
    image: lscr.io/linuxserver/swag:latest@sha256:da04953e9788cf8a0ea8c5686dd3aaae08408b320fc31a77cdba423131aa309f
    container_name: nginx
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - URL=about.bl4ko.com
      - VALIDATION=http
      # - SUBDOMAINS=www, #optional
      - STAGING=false #optional
    volumes:
      - ./docker/swag:/config
    ports:
      - 443:443
      - 80:80 #Required for certbot validation
    restart: unless-stopped
    depends_on:
      - next

  next:
    image: bl4ko/homepage:latest@sha256:acb33036a58272a9adb4d11b19159110675bc6a86911b9be10623ce089dccdb9
    container_name: next
    expose:
      - 3000
