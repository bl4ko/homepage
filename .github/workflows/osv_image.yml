    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@28af2e285603accc4cdf28b78d2ab1bb37023c68 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
