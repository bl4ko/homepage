name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@c29de85d0e1bf1f8b56ea1c02f0c4a67d1cdb382 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
