name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@d86a795f122d9ccea9525e27188ccdf23a4f3792 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
