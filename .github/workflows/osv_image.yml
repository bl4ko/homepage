name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@2554fe3343b91a406567374171c249f4719c36f3 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
