name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@ecee36eb98613ee4d581a9dd7648997082512efe # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
