    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@996c1fcc0186946e630a779a725ba9ccb225d10a # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
