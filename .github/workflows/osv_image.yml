    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@952d56a5addb1bd02d3f1f28b2e1a3bac7c5451f # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
