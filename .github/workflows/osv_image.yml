name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@4febe2c52d4afae22a537e65d782ea5638cc63e7 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
