name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@66335cff564c14702d3317df30c0ef727927d920 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
