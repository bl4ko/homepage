name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@06fc4172ab87db81a8b626cd3740a18aa2efdf9d # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
