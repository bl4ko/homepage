name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@4a4815b3fa25ee2bd525ecb491437d9401227e9f # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
