    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@431af233f489ca5b34f76a9f34ee30c688ff93d5 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
