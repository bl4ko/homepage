name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@2f5ce65473ce5ceec3051454d663de4e9a868dbd # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
