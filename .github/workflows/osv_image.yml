  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@a10d3ecae730917078f33d0e0a438bec5893c4c4 # main
