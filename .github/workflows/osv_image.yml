name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@bad4cbdd1165d57a09881ad3d680c9f6daf2ea76 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
