    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@fa5af959090e6888216217e4ca4e857202da4483 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
