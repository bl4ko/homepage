name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@964a507706b15403a079a4d96aaac530cf80ac8b # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
