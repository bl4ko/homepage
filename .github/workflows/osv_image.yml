    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@9a3fa223ff6e2b6c7e99dc434ca375fd0730ed64 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
