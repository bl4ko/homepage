    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@3c74d7b36b8a170c2c783d6413f1fddd1fcae20c # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
