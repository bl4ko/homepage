name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@bb57ee3d3a12b94dda15103b8327f33f1cdd92e1 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
