name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@080c3aecdd22b57a1976b70e221b2e2aeeea44b8 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
