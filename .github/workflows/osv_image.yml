name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@13de961b80a4f7314273f6fb77c55741225e691f # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
