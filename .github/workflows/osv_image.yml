name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@0563ec443c38a33275ab02a06de1d8dffcd7bb77 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
