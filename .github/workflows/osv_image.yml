name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@78f29de26c205a5cf0c26d290f6b6817b129a860 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
