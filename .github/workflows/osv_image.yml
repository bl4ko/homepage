    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@3357bb7564bb5080b048628f22c8b3fc0dc1d337 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
