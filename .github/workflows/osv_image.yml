name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@c407a22baf9b6b7bff19ad42b0d4e754d16a6adc # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
