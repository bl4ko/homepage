    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@85ade8fe7ec6133716a66bc97aca6e67669cd52b # main
    permissions:
