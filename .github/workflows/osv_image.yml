name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@3778a15257ab94a9f335969398ede64d5c3534f4 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
