name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@b8a2e22768ddf95ab86159c95f965055103be533 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
