name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@96b38a03b41aad9ab45e53a22c39778b44dd5806 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
