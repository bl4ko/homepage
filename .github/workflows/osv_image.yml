name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@64f741a56924d9d7038fc26afa305be050cd1694 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
