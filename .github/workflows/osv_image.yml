    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@a631aecb2d24466646bd1ede6187fea96d147ed5 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
