    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@a576063cc461ddccb21a0cd59d4526d588322e9d # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
