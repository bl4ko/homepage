    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@da3b3ddf3b368dbe8632604bee6a61acfd2a23e0 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
