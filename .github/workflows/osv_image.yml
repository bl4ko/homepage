name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@a3812d2c212cf0fc0669972b2199fdeab1a94419 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
