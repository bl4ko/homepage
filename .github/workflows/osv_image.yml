    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@cbecb42ab55d8ca7a168020d52b20c1df83db1b2 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
