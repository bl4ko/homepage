    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@69102bb0db6d5edc785ca5eb3c8d546d1446466f # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
