name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@bc0fb9328615115beea88de03a529ff6c70b5d17 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
