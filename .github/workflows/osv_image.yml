    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@a93a5940342226db9243b62d3b87c79cd290086c # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
