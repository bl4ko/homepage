name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@8bef9f766dfea01126e75511095c01725751bd8e # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
