    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@8ccecfb4ce8605898bbc3f20e43d49ea525d3fcb # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
