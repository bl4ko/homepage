name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@2072a79851ac46bc8da8a99f06ccdcb9464bf433 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
