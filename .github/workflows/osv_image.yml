name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@72a9ee9d3bccfbd0f0ccf16684d0f328700b408b # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
