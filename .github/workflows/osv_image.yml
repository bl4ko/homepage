name: OSV-Scanner scan Containerfile
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@89fdb71a17397a2747a1fe0300a6b73476ff3576 # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
