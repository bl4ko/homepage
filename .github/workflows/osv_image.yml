    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@5ca92c05072e9083cf25d6523fe147e57bb9483a # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
