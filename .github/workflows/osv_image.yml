    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
jobs:
  osv_scan_image:
    uses: bl4ko/shared-actions/.github/workflows/osv_image.yml@541036aab821cc5f8ad10ca6429516e2d30d26af # main
    permissions:
      contents: read
      packages: write
    with:
      containerfile: ./Dockerfile
